name: Update market data

on:
  workflow_dispatch:
  schedule:
    # Beijing 07:00 and 19:00 = UTC 23:00 and 11:00
    - cron: "0 23,11 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update market snapshot
        run: npm run update:data

      - name: Validate market snapshot
        run: npm run validate:data

      - name: Build site
        run: npm run build

      - name: Commit market snapshot
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update market data snapshot"
          file_pattern: public/data/market.json
